name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend: ruff + mypy + pytest
  # ──────────────────────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy api_gateway ai_worker maps_bridge shared

      - name: Tests (pytest)
        run: uv run pytest -q --tb=short
        env:
          # CI uses mock adapter for Maps + mock LLM — no real API spend
          MAPS_PROVIDER: mock
          LLM_PROVIDER: mock

  # ──────────────────────────────────────────────────────────────
  # Frontend: eslint + tsc + vitest
  # ──────────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (required before tsc — types live in app/generated/prisma/)
        run: npx prisma generate

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Tests (vitest)
        run: npm test -- --run

  # ──────────────────────────────────────────────────────────────
  # Eval suite — runs only when explicitly labeled (cost control)
  # Add label `run-evals` to a PR to trigger
  # ──────────────────────────────────────────────────────────────
  evals:
    if: contains(github.event.pull_request.labels.*.name, 'run-evals')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [python, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - name: Run Promptfoo evals
        run: uv run promptfoo eval -c evals/promptfooconfig.yaml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/