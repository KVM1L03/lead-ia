[mypy]
python_version = 3.12
strict = True
warn_return_any = True
warn_unused_configs = True
explicit_package_bases = True

[mypy-dspy.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-fastmcp.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True

[mypy-litellm.*]
ignore_missing_imports = True

[mypy-temporalio.*]
ignore_missing_imports = True
